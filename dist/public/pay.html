<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صفحة الدفع - DM Fashion House</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      padding: 24px 16px;
      color: #fff;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 440px; width: 100%;
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    .logo { height: 56px; object-fit: contain; }
    .store-name { color: #C9A96E; font-size: 1.1rem; font-weight: 700; letter-spacing: 1px; }
    .divider { width: 50px; height: 2px; background: linear-gradient(90deg, transparent, #C9A96E, transparent); }
    .amount { font-size: 2rem; font-weight: 800; color: #C9A96E; }
    .amount-label { font-size: 0.85rem; color: #888; margin-top: -12px; }
    .customer { color: #aaa; font-size: 0.95rem; }
    .pay-btn {
      width: 100%;
      background: linear-gradient(135deg, #C9A96E, #a07840);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px 24px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
      text-align: center;
      display: block;
    }
    .pay-btn:hover { opacity: 0.9; }
    .pay-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status-paid {
      background: #1a3a1a;
      border: 1px solid #2a5a2a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      width: 100%;
    }
    .status-paid .icon { font-size: 2.5rem; margin-bottom: 8px; }
    .status-paid h2 { color: #4caf50; font-size: 1.3rem; }
    .status-paid p { color: #888; font-size: 0.9rem; margin-top: 6px; }
    .loading { color: #888; font-size: 0.9rem; }
    .error-msg { color: #e57373; font-size: 0.9rem; text-align: center; }
    .footer { margin-top: 24px; color: #333; font-size: 0.75rem; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2a2a2a;
      border-top-color: #C9A96E;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="card">
    <!-- الشعار -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <img src="/logo-dark.webp" alt="DM Fashion House" class="logo"
           onerror="this.style.display='none'" />
      <div class="store-name" id="storeName">DM Fashion House</div>
      <div class="divider"></div>
    </div>

    <!-- محتوى ديناميكي -->
    <div id="content" style="display:flex;flex-direction:column;align-items:center;gap:16px;width:100%">
      <div class="spinner"></div>
      <p class="loading">جاري تحميل معلومات الدفع...</p>
    </div>
  </div>

  <p class="footer" id="footerYear"></p>

  <script>
    document.getElementById('footerYear').textContent =
      'DM Fashion House © ' + new Date().getFullYear();

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    async function loadPaymentInfo() {
      const contentEl = document.getElementById('content');
      const storeNameEl = document.getElementById('storeName');

      if (!token) {
        contentEl.innerHTML = '<p class="error-msg">رابط الدفع غير صحيح</p>';
        return;
      }

      try {
        const res = await fetch('/api/payment-info?token=' + encodeURIComponent(token));
        const data = await res.json();

        if (!res.ok) {
          contentEl.innerHTML = '<p class="error-msg">' + (data.error || 'خطأ في تحميل معلومات الدفع') + '</p>';
          return;
        }

        if (data.storeName) storeNameEl.textContent = data.storeName;

        if (data.status === 'paid') {
          contentEl.innerHTML = `
            <div class="status-paid">
              <div class="icon">✓</div>
              <h2>تم السداد بنجاح!</h2>
              <p>شكراً لتسوّقك من ${data.storeName || 'DM Fashion House'}</p>
            </div>`;
          return;
        }

        if (!data.mfPaymentUrl) {
          contentEl.innerHTML = '<p class="error-msg">رابط الدفع غير متاح</p>';
          return;
        }

        const amount = parseFloat(data.total || 0).toFixed(2);
        const customerName = data.customerName ? 'مرحباً، ' + data.customerName : '';

        contentEl.innerHTML = `
          <div class="amount">${amount} <span style="font-size:1rem;color:#888">ر.س</span></div>
          ${customerName ? '<p class="customer">' + customerName + '</p>' : ''}
          <a href="${data.mfPaymentUrl}" class="pay-btn" id="payBtn">
            💳 ادفع الآن
          </a>
          <p style="color:#555;font-size:0.8rem;text-align:center">
            ستُحوَّل لصفحة الدفع الآمنة
          </p>`;

        // إعادة التحقق من الحالة كل 5 ثوانٍ
        const pollInterval = setInterval(async () => {
          try {
            const r2 = await fetch('/api/payment-info?token=' + encodeURIComponent(token));
            const d2 = await r2.json();
            if (d2.status === 'paid') {
              clearInterval(pollInterval);
              contentEl.innerHTML = `
                <div class="status-paid">
                  <div class="icon">✓</div>
                  <h2>تم السداد بنجاح!</h2>
                  <p>شكراً لتسوّقك من ${d2.storeName || 'DM Fashion House'}</p>
                </div>`;
            }
          } catch(e) {}
        }, 5000);

      } catch (e) {
        document.getElementById('content').innerHTML =
          '<p class="error-msg">خطأ في الاتصال بالخادم</p>';
      }
    }

    loadPaymentInfo();
  </script>
</body>
</html>
